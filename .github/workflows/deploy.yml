name: Deploy netprime.fun to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/netprime-landing

            git fetch --all
            git reset --hard origin/main

            chown -R www-data:www-data /var/www/netprime-landing
            chmod -R 755 /var/www/netprime-landing
            find /var/www/netprime-landing -type f -exec chmod 644 {} \;

            systemctl reload nginx
